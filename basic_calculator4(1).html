<html>
<body>
	<h1>BASIC CALCULATOR</h1>
	<input type="number" id="num1" placeholder="Enter first number">
	<input type="number" id="num2" placeholder="Enter second number">
	<button onclick="addNumbers()">Add</button>
	<button onclick="subNumbers()">Sub</button>
	<button onclick="multiNumbers()">Multiply</button>
	<button onclick="divNumbers()">divide</button>
	<button onclick="modNumbers()">modulo</button>
	<h2 id="result"></h2>
</body>
<script>
	function addNumbers(){
		let n1=document.getElementById("num1").value;
		let n2=document.getElementById("num2").value;
		let res=Number(n1)+Number(n2);
		document.getElementById("result").textContent="Addition of two numbers: "+res;
	}
	function subNumbers(){
		let n1=document.getElementById("num1").value;
		let n2=document.getElementById("num2").value;
		let res=Number(n1)-Number(n2);
		document.getElementById("result").textContent="Subtraction of two numbers: "+res;
	}
	function multiNumbers(){
		let n1=document.getElementById("num1").value;
		let n2=document.getElementById("num2").value;
		let res=Number(n1)*Number(n2);
		document.getElementById("result").textContent="Multiplication of two numbers: "+res;
	}
	function divNumbers(){
		let n1=document.getElementById("num1").value;
		let n2=document.getElementById("num2").value;
		let res=Number(n1)/Number(n2);
		document.getElementById("result").textContent="Division of two numbers: "+res;
	}
	function modNumbers(){
		let n1=document.getElementById("num1").value;
		let n2=document.getElementById("num2").value;
		let res=Number(n1)%Number(n2);
		document.getElementById("result").textContent="Modulo of two numbers: "+res;
	}
</script>
</html>
