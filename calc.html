<html>
<body>
<button onclick="clk()"> Single Click </button>
<button ondblclick="dbclk()"> Double Click </button>
<button onmouseenter="hovo()"> Hover Over </button>
<button contextmenu ="conm()"> Right Click </button>
<hr>
<button onclick="a()"> Addition </button>
<button onclick="s()"> Subtraction </button>
<button onclick="m()"> Multiplication </button>
<button onclick="d()"> Division </button>
</body>
<script>
function clk()
{
alert("Single Clicked👍");
}
function dbclk()
{
alert("Double Clicked👍");
}
function hovo()
{
alert("Hover overed👍");
}
function conm()
{
alert("Right Clicked👍");
}

let n = 0;
let n1 = 1;
let n2 = 2;
let n3 = 3;
let n4 = 4;
let n5 = 5;
let n6 = 6;
function a()
{
alert("Sum of 6 numbers: " + (n+n1+n2+n3+n4+n5+n6));
}
function s()
{
alert(n6 - n2);
}
function m()
{
alert(n1*n2*n3*n4*n5*n6);
}
function d()
{
alert(n6/n1);
}


</script>
</html>
