<!DOCTYPE html>
<html>
<head>
    <title>Scientific Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #f5f5f5, #e0e0e0);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.2);
            width: 350px;
            text-align: center;
        }

        h1 {
            background-color: darkred;
            color: white;
            padding: 10px;
            border-radius: 8px;
        }

        label {
            font-weight: bold;
        }

        input {
            width: 90%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        .btn-group {
            margin-top: 10px;
        }

        button {
            background-color: darkred;
            color: white;
            border: none;
            padding: 8px 12px;
            margin: 5px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #a00000;
            transform: scale(1.05);
        }

        #res {
            margin-top: 15px;
            color: darkred;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>

<body>
<div class="container">
    <h1>Scientific Calculator</h1>

    <label>Number 1</label><br>
    <input id="n1" type="number" placeholder="Enter number 1"/><br><br>

    <label>Number 2</label><br>
    <input id="n2" type="number" placeholder="Enter number 2"/><br><br>

    <div class="btn-group">
        <button onclick="add()">Add</button>
        <button onclick="subtract()">Sub</button>
        <button onclick="multiply()">Mul</button>
        <button onclick="divide()">Div</button>
        <button onclick="modulo()">Mod</button>
    </div>

    <div class="btn-group">
        <button onclick="sin()">Sin</button>
        <button onclick="cos()">Cos</button>
        <button onclick="tan()">Tan</button>
        <button onclick="log()">Log</button>
        <button onclick="exp()">Exp</button>
    </div>

    <div class="btn-group">
        <button onclick="spiral()">Spiral Matrix</button>
    </div>

    <h2 id="res"></h2>
</div>

<script>
    async function add(){
        const num1=document.getElementById("n1").value;
        const num2=document.getElementById("n2").value;
        const response=await fetch(`http://localhost:8080/calc/add/${num1}/${num2}`);
        const text=await response.text();
        document.getElementById("res").innerText=text;
    }

    async function subtract(){
        const num1=document.getElementById("n1").value;
        const num2=document.getElementById("n2").value;
        const response=await fetch(`http://localhost:8080/calc/sub/${num1}/${num2}`);
        const text=await response.text();
        document.getElementById("res").innerText=text;
    }

    async function multiply(){
        const num1=document.getElementById("n1").value;
        const num2=document.getElementById("n2").value;
        const response=await fetch(`http://localhost:8080/calc/mul/${num1}/${num2}`);
        const text=await response.text();
        document.getElementById("res").innerText=text;
    }

    async function divide(){
        const num1=document.getElementById("n1").value;
        const num2=document.getElementById("n2").value;
        const response=await fetch(`http://localhost:8080/calc/div/${num1}/${num2}`);
        const text=await response.text();
        document.getElementById("res").innerText=text;
    }

    async function modulo(){
        const num1=document.getElementById("n1").value;
        const num2=document.getElementById("n2").value;
        const response=await fetch(`http://localhost:8080/calc/mod/${num1}/${num2}`);
        const text=await response.text();
        document.getElementById("res").innerText=text;
    }

    async function sin(){
        const num1=document.getElementById("n1").value;
        const response=await fetch(`http://localhost:8080/calc/sin/${num1}`);
        const text=await response.text();
        document.getElementById("res").innerText=text;
    }

    async function cos(){
        const num1=document.getElementById("n1").value;
        const response=await fetch(`http://localhost:8080/calc/cos/${num1}`);
        const text=await response.text();
        document.getElementById("res").innerText=text;
    }

    async function tan(){
        const num1=document.getElementById("n1").value;
        const response=await fetch(`http://localhost:8080/calc/tan/${num1}`);
        const text=await response.text();
        document.getElementById("res").innerText=text;
    }

    async function log(){
        const num1=document.getElementById("n1").value;
        const response=await fetch(`http://localhost:8080/calc/log/${num1}`);
        const text=await response.text();
        document.getElementById("res").innerText=text;
    }

    async function exp(){
        const num1=document.getElementById("n1").value;
        const response=await fetch(`http://localhost:8080/calc/exp/${num1}`);
        const text=await response.text();
        document.getElementById("res").innerText=text;
    }

    async function spiral(){
        const response=await fetch(`http://localhost:8080/calc/spiral`);
        const text=await response.text();
        document.getElementById("res").innerText=text;
    }
</script>

</body>
</html>
