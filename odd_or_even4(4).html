<html>
<body>
	<h1>ODD OR EVEN</h1>
	<input type="number" id="num1" placeholder="Enter first number">
	<input type="number" id="num2" placeholder="Enter second number">
	<button onclick="display()">Add</button>
	<p id="add"></p>
	<p id="sod"></p>
	<h1 id="result"></h1>
<script>
	function display(){
		let n1=document.getElementById("num1").value;
		let n2=document.getElementById("num2").value;
		let res=Number(n1)+Number(n2);
		document.getElementById("add").textContent="Addition of two numbers: "+res;
		let sumofdigit=0
		while(res!=0){
			sumofdigit+=res%10;
			res=Math.floor(res/10);
		}
		document.getElementById("sod").textContent="Sum of added number: "+sumofdigit;
		if(sumofdigit%2==0){
			document.getElementById("result").textContent="The sum of digit is Even";
		}
		else{
			document.getElementById("result").textContent="The sum of digit is Odd";
		}
	}
</script>
</body>
</html>
