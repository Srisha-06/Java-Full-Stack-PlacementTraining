<html>
<body>
<script>
	let mypromise=new Promise(
		(resolve,reject)=>{
			let success=true;
			if(success==true){
				resolve("Send my ticket");
			}
			else{
				reject("Send my money back, I book flight ticket");
			}
		});
			mypromise
				.then(result=>{console.log(result)})
				.catch(error=>{console.log(error)})
</script>
