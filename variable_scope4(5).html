<html>
<body>
	<h1>Variable Scope</h1>
<script>
	//var scope
	var a=200
	console.log(a)
	var a=300  //redeclare
	console.log(a)
	a=400  //reassign
	console.log(a)

	//let scope
	let b=20
	console.log(b)
	let b=30  //redeclare
	console.log(b)
	b=40  //reassign
	console.log(b)

	//const scope
	const c=2
	console.log(c)
	const c=3  //redeclare
	console.log(c)
	c=4  //reassign
	console.log(c)
</script>
</body>
</html>
